name: secrets-scan
on: [push, pull-request]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: trufflehog
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog
    uses: trufflesecurity/trufflehog@main
    with:
      path: ./
      extra_args: --only-verified
